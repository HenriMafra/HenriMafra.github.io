<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>🐍 Neon Snake</title>
<style>
  :root{
    --bg:#06080f; --panel:#121829; --line:#26304a; --text:#cdd6f4; --muted:#6b7494;
    --cyan:#7df9ff; --purple:#b388ff; --rose:#ff5d8f;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:radial-gradient(1200px 700px at 50% -5%, #18203a 0, #0a0e1a 45%, var(--bg) 100%);
    color:var(--text);font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100dvh;gap:12px;padding:14px;overflow:hidden;
  }
  .wrap{display:flex;flex-direction:column;gap:12px;align-items:center;width:100%;max-width:560px}
  .bar{display:flex;align-items:center;justify-content:space-between;width:100%;padding:0 4px}
  .title{font-size:clamp(18px,4.5vw,24px);font-weight:800;letter-spacing:.3px;
    background:linear-gradient(90deg,var(--cyan),var(--purple));-webkit-background-clip:text;
    background-clip:text;color:transparent;text-shadow:0 0 22px rgba(125,249,255,.20)}
  .scores{display:flex;gap:10px}
  .scores span{background:var(--panel);border:1px solid var(--line);border-radius:11px;
    padding:7px 13px;font-size:12px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
  .scores b{display:inline-block;margin-left:6px;font-size:16px;color:var(--cyan)}
  .scores span.best b{color:#ffd166}
  .stage{position:relative;line-height:0}
  canvas{border:1px solid var(--line);border-radius:16px;
    box-shadow:0 0 0 1px rgba(125,249,255,.06),0 24px 60px rgba(0,0,0,.6);touch-action:none;display:block}
  .demo{position:absolute;top:10px;left:50%;transform:translateX(-50%);
    background:rgba(18,24,41,.82);border:1px solid var(--line);color:var(--cyan);
    font-size:12px;font-weight:700;padding:6px 14px;border-radius:999px;backdrop-filter:blur(4px);
    white-space:nowrap;pointer-events:none;transition:opacity .3s}
  .demo.hide{opacity:0}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:8px;text-align:center;padding:20px;background:rgba(6,8,15,.74);backdrop-filter:blur(3px);
    border-radius:16px;cursor:pointer}
  .overlay.hidden{display:none}
  .overlay h2{font-size:clamp(22px,6vw,32px);font-weight:800}
  .overlay p{color:var(--muted);font-size:14px;line-height:1.55;max-width:280px}
  .hint{color:var(--muted);font-size:12.5px;text-align:center}
  .hint kbd{background:var(--panel);border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;padding:1px 6px;color:var(--text)}
  .back{position:fixed;top:12px;left:12px;color:var(--muted);text-decoration:none;font-size:12px;
    background:var(--panel);border:1px solid var(--line);padding:6px 11px;border-radius:9px}
  .back:hover{color:var(--cyan)}
  .pad{display:none;grid-template-columns:repeat(3,54px);grid-template-rows:repeat(3,54px);gap:7px}
  .pad button{background:var(--panel);border:1px solid var(--line);border-radius:11px;color:var(--cyan);
    font-size:20px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .pad button:active{background:var(--line)}
  .pad .u{grid-area:1/2}.pad .l{grid-area:2/1}.pad .d{grid-area:3/2}.pad .r{grid-area:2/3}
  @media (hover:none) and (pointer:coarse){ .pad{display:grid} .hint .keys{display:none} }
</style>
</head>
<body>
  <a class="back" href="https://github.com/HenriMafra">← perfil</a>
  <div class="wrap">
    <div class="bar">
      <div class="title">🐍 Neon Snake</div>
      <div class="scores">
        <span>Score<b id="score">0</b></span>
        <span class="best">Best<b id="best">0</b></span>
      </div>
    </div>
    <div class="stage">
      <canvas id="game"></canvas>
      <div class="demo" id="demo">🤖 DEMO · toque ou use as setas para jogar</div>
      <div class="overlay hidden" id="overlay"><h2 id="ovt"></h2><p id="ovp"></p></div>
    </div>
    <div class="hint"><span class="keys"><kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> / <kbd>WASD</kbd> · <kbd>espaço</kbd> pausa · </span>arraste na tela no celular</div>
    <div class="pad">
      <button class="u" data-d="u">▲</button><button class="l" data-d="l">◀</button>
      <button class="d" data-d="d">▼</button><button class="r" data-d="r">▶</button>
    </div>
  </div>

<script>
(function(){
  const GRID = 20;
  const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
  const scoreEl=document.getElementById('score'), bestEl=document.getElementById('best');
  const demoEl=document.getElementById('demo'), overlay=document.getElementById('overlay');
  const ovt=document.getElementById('ovt'), ovp=document.getElementById('ovp');

  let W, cell;                       // CSS pixel size of board + cell
  let cells, fromCells, dir, nextDir, food, score, best, stepTime, acc, mode, tInterp, now=0;
  let particles=[];

  best = parseInt(localStorage.getItem('neonSnakeBest')||'0',10); bestEl.textContent=best;

  function fit(){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const avail=Math.min(window.innerWidth-26, window.innerHeight-190);
    W=Math.max(260, Math.min(520, avail));
    canvas.style.width=W+'px'; canvas.style.height=W+'px';
    canvas.width=Math.round(W*dpr); canvas.height=Math.round(W*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    cell=W/GRID;
  }

  function isBody(x,y,ignoreTail){
    const n=cells.length-(ignoreTail?1:0);
    for(let i=0;i<n;i++) if(cells[i].x===x&&cells[i].y===y) return true;
    return false;
  }
  function placeFood(){ let p; do{p={x:(Math.random()*GRID)|0,y:(Math.random()*GRID)|0};}while(isBody(p.x,p.y,false)); food=p; }

  function reset(){
    cells=[{x:10,y:10},{x:9,y:10},{x:8,y:10},{x:7,y:10}];
    fromCells=cells.map(c=>({x:c.x,y:c.y}));
    dir={x:1,y:0}; nextDir={x:1,y:0};
    score=0; acc=0; stepTime = (mode==='demo')?100:125;
    placeFood(); updateHUD();
  }
  function startDemo(){ mode='demo'; reset(); demoEl.classList.remove('hide'); overlay.classList.add('hidden'); }
  function startHuman(){ mode='human'; reset(); demoEl.classList.add('hide'); overlay.classList.add('hidden'); }
  function updateHUD(){ scoreEl.textContent=score; bestEl.textContent=best; }

  function burst(c){
    const cx=(c.x+0.5)*cell, cy=(c.y+0.5)*cell;
    for(let i=0;i<14;i++){ const a=Math.random()*Math.PI*2, sp=cell*(0.05+Math.random()*0.14);
      particles.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1}); }
  }

  // greedy AI for the demo: head toward food, stay safe, avoid trapping itself
  function floodFree(sx,sy){
    const seen=new Uint8Array(GRID*GRID), block=new Uint8Array(GRID*GRID);
    for(let i=0;i<cells.length-1;i++) block[cells[i].y*GRID+cells[i].x]=1;
    const st=[[sx,sy]]; let n=0;
    while(st.length){ const [x,y]=st.pop();
      if(x<0||y<0||x>=GRID||y>=GRID) continue;
      const k=y*GRID+x; if(seen[k]||block[k]) continue;
      seen[k]=1; n++; st.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]); }
    return n;
  }
  function aiDir(){
    const h=cells[0];
    const opts=[{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}].filter(d=>!(d.x===-dir.x&&d.y===-dir.y));
    let best=null, bestScore=-1e9;
    for(const d of opts){
      const nx=h.x+d.x, ny=h.y+d.y;
      if(nx<0||ny<0||nx>=GRID||ny>=GRID) continue;
      if(isBody(nx,ny,true)) continue;
      const space=floodFree(nx,ny);
      const dist=Math.abs(nx-food.x)+Math.abs(ny-food.y);
      const sc=(space>=cells.length?5000:0)+space*3-dist;
      if(sc>bestScore){bestScore=sc; best=d;}
    }
    return best||dir;
  }

  function logicalStep(){
    dir = (mode==='demo') ? aiDir() : nextDir;
    const h={x:cells[0].x+dir.x, y:cells[0].y+dir.y};
    if(h.x<0||h.y<0||h.x>=GRID||h.y>=GRID || isBody(h.x,h.y,true)){ die(); return false; }
    cells.unshift(h);
    if(h.x===food.x && h.y===food.y){ score++; updateHUD(); burst(food); placeFood(); if(stepTime>68) stepTime-=2.5; }
    else cells.pop();
    return true;
  }
  function die(){
    if(mode==='human'){
      if(score>best){ best=score; localStorage.setItem('neonSnakeBest',best); updateHUD(); }
      mode='gameover';
      ovt.textContent='💀 Game Over';
      ovp.innerHTML='Você fez <b style="color:#7df9ff">'+score+'</b> ponto'+(score===1?'':'s')+'. Recorde: '+best+'.<br>Toque para jogar de novo.';
      overlay.classList.remove('hidden');
      setTimeout(()=>{ if(mode==='gameover') startDemo(); }, 3200);
    } else { startDemo(); }
  }

  function strokePath(pts){
    ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
    ctx.stroke();
  }
  function drawBg(){
    let g=ctx.createLinearGradient(0,0,0,W); g.addColorStop(0,'#0c1322'); g.addColorStop(1,'#070a13');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,W);
    let r=ctx.createRadialGradient(W/2,W*0.4,W*0.05,W/2,W/2,W*0.78);
    r.addColorStop(0,'rgba(70,95,165,.16)'); r.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=r; ctx.fillRect(0,0,W,W);
    ctx.strokeStyle='rgba(140,170,255,.045)'; ctx.lineWidth=1;
    for(let i=1;i<GRID;i++){ ctx.beginPath();ctx.moveTo(i*cell,0);ctx.lineTo(i*cell,W);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,i*cell);ctx.lineTo(W,i*cell);ctx.stroke(); }
  }
  function draw(){
    drawBg();
    // food
    const fx=(food.x+0.5)*cell, fy=(food.y+0.5)*cell, p=0.5+0.5*Math.sin(now*0.006);
    ctx.shadowBlur=16+p*10; ctx.shadowColor=getCss('--rose'); ctx.fillStyle=getCss('--rose');
    ctx.beginPath(); ctx.arc(fx,fy,cell*(0.27+p*0.05),0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    // interpolated snake points
    const pts=cells.map((c,i)=>{ const f=fromCells[i]||c;
      return {x:(f.x+(c.x-f.x)*tInterp+0.5)*cell, y:(f.y+(c.y-f.y)*tInterp+0.5)*cell}; });
    ctx.lineJoin='round'; ctx.lineCap='round';
    // glow tube (one stroke)
    ctx.strokeStyle='rgba(125,249,255,.16)'; ctx.lineWidth=cell*1.2;
    ctx.shadowBlur=16; ctx.shadowColor='rgba(125,249,255,.65)'; strokePath(pts); ctx.shadowBlur=0;
    // gradient body (one stroke)
    const g=ctx.createLinearGradient(pts[0].x,pts[0].y,pts[pts.length-1].x,pts[pts.length-1].y);
    g.addColorStop(0,getCss('--cyan')); g.addColorStop(1,getCss('--purple'));
    ctx.strokeStyle=g; ctx.lineWidth=cell*0.76; strokePath(pts);
    // head + eyes
    const hd=pts[0];
    ctx.fillStyle='#eaffff'; ctx.shadowBlur=14; ctx.shadowColor=getCss('--cyan');
    ctx.beginPath(); ctx.arc(hd.x,hd.y,cell*0.42,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    const px=-dir.y, py=dir.x;
    ctx.fillStyle='#0a0e1a';
    for(const s of [1,-1]){ ctx.beginPath();
      ctx.arc(hd.x+dir.x*cell*0.12+px*s*cell*0.17, hd.y+dir.y*cell*0.12+py*s*cell*0.17, cell*0.075,0,Math.PI*2); ctx.fill(); }
    // particles
    if(particles.length){ ctx.save(); ctx.globalCompositeOperation='lighter';
      for(const q of particles){ q.x+=q.vx; q.y+=q.vy; q.vx*=0.9; q.vy*=0.9; q.life-=0.045;
        if(q.life>0){ ctx.globalAlpha=Math.max(0,q.life); ctx.fillStyle='#ff9dbf';
          ctx.beginPath(); ctx.arc(q.x,q.y,cell*0.13*q.life+0.5,0,Math.PI*2); ctx.fill(); } }
      ctx.restore(); ctx.globalAlpha=1; particles=particles.filter(q=>q.life>0); }
  }
  const cssCache={};
  function getCss(v){ if(!cssCache[v]) cssCache[v]=getComputedStyle(document.documentElement).getPropertyValue(v).trim(); return cssCache[v]; }

  let last=0;
  function frame(ts){
    const dt=last?Math.min(ts-last,100):16; last=ts; now=ts;
    if(mode==='human'||mode==='demo'){
      acc+=dt; let steps=0;
      while(acc>=stepTime && steps<5){ acc-=stepTime; fromCells=cells.map(c=>({x:c.x,y:c.y}));
        steps++; if(!logicalStep()){ acc=0; break; } }
      if(acc>stepTime*5) acc=stepTime;
      tInterp=Math.min(1,acc/stepTime);
    } else { tInterp=1; }
    draw();
    requestAnimationFrame(frame);
  }

  function input(dx,dy){
    if(mode!=='human'){ startHuman(); }
    if(dx===-dir.x && dy===-dir.y) return;
    nextDir={x:dx,y:dy};
  }
  function togglePause(){
    if(mode==='human'){ mode='pause'; ovt.textContent='⏸ Pausado'; ovp.textContent='Toque para continuar.'; overlay.classList.remove('hidden'); }
    else if(mode==='pause'){ mode='human'; overlay.classList.add('hidden'); last=0; }
  }
  window.addEventListener('keydown',e=>{
    const k=e.key.toLowerCase();
    if(['arrowup','w'].includes(k)) input(0,-1);
    else if(['arrowdown','s'].includes(k)) input(0,1);
    else if(['arrowleft','a'].includes(k)) input(-1,0);
    else if(['arrowright','d'].includes(k)) input(1,0);
    else if(k===' '){ e.preventDefault(); togglePause(); return; }
    else return;
    e.preventDefault();
  },{passive:false});
  document.querySelector('.pad').addEventListener('click',e=>{ const d=e.target.dataset.d; if(!d)return;
    if(d==='u')input(0,-1); if(d==='d')input(0,1); if(d==='l')input(-1,0); if(d==='r')input(1,0); });
  overlay.addEventListener('click',()=>{ if(mode==='pause'){ togglePause(); } else { startHuman(); } });
  let tx=0,ty=0;
  canvas.addEventListener('touchstart',e=>{const t=e.touches[0];tx=t.clientX;ty=t.clientY;},{passive:true});
  canvas.addEventListener('touchend',e=>{const t=e.changedTouches[0];const dx=t.clientX-tx,dy=t.clientY-ty;
    if(Math.abs(dx)<18&&Math.abs(dy)<18){ if(mode!=='human') startHuman(); return; }
    if(Math.abs(dx)>Math.abs(dy)) input(dx>0?1:-1,0); else input(0,dy>0?1:-1); },{passive:true});
  window.addEventListener('resize',fit);

  // debug hook (harmless)
  window.__dbg=()=>({mode,score,len:cells.length,head:cells[0]});

  // boot — starts in auto-demo, no click needed
  fit(); startDemo(); requestAnimationFrame(frame);
})();
</script>
</body>
</html>
