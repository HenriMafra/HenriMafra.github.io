<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>🐍 Henri's Neon Snake</title>
<style>
  :root{
    --bg:#1a1b26; --bg2:#16161e; --panel:#24283b; --text:#c0caf5; --muted:#565f89;
    --cyan:#7dcfff; --blue:#7aa2f7; --purple:#bb9af7; --green:#9ece6a; --red:#f7768e; --yellow:#e0af68;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:radial-gradient(1200px 800px at 50% -10%, #2a2e45 0%, var(--bg) 55%, var(--bg2) 100%);
    color:var(--text);font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100dvh;padding:16px;gap:14px;overflow:hidden;
  }
  h1{font-size:clamp(20px,5vw,30px);font-weight:800;letter-spacing:.5px;
     background:linear-gradient(90deg,var(--green),var(--cyan),var(--purple));
     -webkit-background-clip:text;background-clip:text;color:transparent;
     text-shadow:0 0 24px rgba(125,207,255,.25)}
  .hud{display:flex;gap:10px;align-items:stretch}
  .chip{background:var(--panel);border:1px solid #2f3550;border-radius:12px;padding:8px 16px;
        min-width:96px;text-align:center;box-shadow:0 4px 18px rgba(0,0,0,.35)}
  .chip .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .chip .val{font-size:22px;font-weight:800;color:var(--cyan)}
  .chip.best .val{color:var(--yellow)}
  .stage{position:relative}
  canvas{background:linear-gradient(180deg,#1b1d2e,#14151f);border:1px solid #2f3550;
         border-radius:16px;box-shadow:0 0 0 1px rgba(125,207,255,.08),0 18px 50px rgba(0,0,0,.55);
         display:block;touch-action:none}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
           gap:14px;background:rgba(20,21,31,.82);backdrop-filter:blur(3px);border-radius:16px;text-align:center;padding:20px}
  .overlay.hidden{display:none}
  .overlay h2{font-size:clamp(22px,6vw,34px);font-weight:800}
  .overlay p{color:var(--muted);max-width:300px;line-height:1.5;font-size:14px}
  .btn{cursor:pointer;border:none;border-radius:12px;padding:12px 26px;font-size:16px;font-weight:800;
       color:#0b0d16;background:linear-gradient(90deg,var(--green),var(--cyan));
       box-shadow:0 6px 24px rgba(125,207,255,.35);transition:transform .08s ease,filter .2s}
  .btn:hover{filter:brightness(1.08)} .btn:active{transform:translateY(2px)}
  .hint{color:var(--muted);font-size:13px;text-align:center;line-height:1.6}
  .hint kbd{background:var(--panel);border:1px solid #2f3550;border-bottom-width:3px;border-radius:6px;
            padding:1px 7px;font-size:12px;color:var(--text)}
  /* mobile d-pad */
  .pad{display:none;grid-template-columns:repeat(3,58px);grid-template-rows:repeat(3,58px);gap:8px;margin-top:4px}
  .pad button{background:var(--panel);border:1px solid #2f3550;border-radius:12px;color:var(--cyan);
              font-size:22px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .pad button:active{background:#2f3550}
  .pad .up{grid-area:1/2} .pad .left{grid-area:2/1} .pad .down{grid-area:3/2} .pad .right{grid-area:2/3}
  .back{position:fixed;top:14px;left:14px;color:var(--muted);text-decoration:none;font-size:13px;
        background:var(--panel);border:1px solid #2f3550;padding:7px 12px;border-radius:10px}
  .back:hover{color:var(--cyan)}
  @media (hover:none) and (pointer:coarse){ .pad{display:grid} .hint .keys{display:none} }
</style>
</head>
<body>
  <a class="back" href="https://github.com/HenriMafra">← perfil</a>
  <h1>🐍 Henri's Neon Snake</h1>
  <div class="hud">
    <div class="chip"><div class="lbl">Score</div><div class="val" id="score">0</div></div>
    <div class="chip best"><div class="lbl">Best</div><div class="val" id="best">0</div></div>
  </div>

  <div class="stage">
    <canvas id="game" width="420" height="420"></canvas>
    <div class="overlay" id="overlay">
      <h2 id="ov-title">Neon Snake</h2>
      <p id="ov-text">Coma os pontos, cresça e não bata nas paredes nem em você mesmo. Boa sorte! 🎮</p>
      <button class="btn" id="startBtn">▶ Jogar</button>
    </div>
  </div>

  <div class="hint">
    <span class="keys"><kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> ou <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> &nbsp;•&nbsp; <kbd>Espaço</kbd> pausa</span>
    <div>arraste na tela no celular</div>
  </div>

  <div class="pad" id="pad">
    <button class="up" data-dir="up">▲</button>
    <button class="left" data-dir="left">◀</button>
    <button class="down" data-dir="down">▼</button>
    <button class="right" data-dir="right">▶</button>
  </div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const GRID = 20;                 // cells per side
  const scoreEl = document.getElementById('score');
  const bestEl  = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const ovTitle = document.getElementById('ov-title');
  const ovText  = document.getElementById('ov-text');
  const startBtn= document.getElementById('startBtn');

  let cell, snake, dir, nextDir, food, score, speed, acc, last, state, best;
  let pulse = 0;

  best = parseInt(localStorage.getItem('neonSnakeBest')||'0',10);
  bestEl.textContent = best;

  function fitCanvas(){
    const max = Math.min(window.innerWidth - 32, window.innerHeight - 260, 460);
    const size = Math.max(260, Math.floor(max/GRID)*GRID);
    canvas.width = size; canvas.height = size;
    cell = size / GRID;
  }

  function reset(){
    snake = [{x:8,y:10},{x:7,y:10},{x:6,y:10}];
    dir = {x:1,y:0}; nextDir = {x:1,y:0};
    score = 0; speed = 150; acc = 0; last = 0;
    scoreEl.textContent = '0';
    spawnFood();
  }

  function spawnFood(){
    let p;
    do { p = {x:(Math.random()*GRID)|0, y:(Math.random()*GRID)|0}; }
    while (snake.some(s=>s.x===p.x && s.y===p.y));
    food = p;
  }

  function setDir(nx,ny){
    if (snake && (nx === -dir.x && ny === -dir.y)) return; // no reverse
    nextDir = {x:nx,y:ny};
  }

  function step(){
    dir = nextDir;
    const head = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};
    // collisions: walls or self
    if (head.x<0||head.y<0||head.x>=GRID||head.y>=GRID || snake.some(s=>s.x===head.x&&s.y===head.y)){
      return end();
    }
    snake.unshift(head);
    if (head.x===food.x && head.y===food.y){
      score++; scoreEl.textContent = score;
      if (speed > 60) speed -= 4;          // accelerate
      spawnFood();
    } else {
      snake.pop();
    }
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // grid
    ctx.strokeStyle = 'rgba(125,207,255,.05)'; ctx.lineWidth = 1;
    for(let i=1;i<GRID;i++){
      ctx.beginPath(); ctx.moveTo(i*cell,0); ctx.lineTo(i*cell,canvas.height); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,i*cell); ctx.lineTo(canvas.width,i*cell); ctx.stroke();
    }
    // food (pulsing glow)
    pulse += 0.12;
    const fp = 0.5 + Math.sin(pulse)*0.5;
    const fx = food.x*cell + cell/2, fy = food.y*cell + cell/2;
    ctx.shadowBlur = 18 + fp*10; ctx.shadowColor = '#f7768e';
    ctx.fillStyle = '#f7768e';
    ctx.beginPath(); ctx.arc(fx,fy,cell*0.32,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    // snake (gradient + glow)
    for(let i=snake.length-1;i>=0;i--){
      const s = snake[i];
      const t = i/Math.max(1,snake.length-1);
      const r = Math.round(158 + (125-158)*t);
      const g = Math.round(206 + (207-206)*t);
      const b = Math.round(106 + (255-106)*t);
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.shadowBlur = i===0 ? 20 : 8;
      ctx.shadowColor = i===0 ? '#7dcfff' : '#9ece6a';
      const pad = cell*0.10;
      roundRect(s.x*cell+pad, s.y*cell+pad, cell-pad*2, cell-pad*2, cell*0.28);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }

  function loop(ts){
    if (state!=='play'){ draw(); return; }
    if (!last) last = ts;
    acc += ts - last; last = ts;
    if (acc > speed*5) acc = speed;        // resumed from a background tab: don't fast-forward into a death
    let steps = 0;
    while (acc >= speed && steps < 5){ step(); acc -= speed; steps++; if(state!=='play') break; }
    draw();
    if (state==='play') requestAnimationFrame(loop);
  }

  function play(){
    reset(); state='play'; overlay.classList.add('hidden'); last = 0;
    requestAnimationFrame(loop);
  }
  function pause(){
    if (state==='play'){ state='pause'; ovTitle.textContent='⏸ Pausado';
      ovText.textContent='Aperte continuar (ou Espaço).'; startBtn.textContent='▶ Continuar';
      overlay.classList.remove('hidden'); }
    else if (state==='pause'){ state='play'; overlay.classList.add('hidden'); last=0; requestAnimationFrame(loop); }
  }
  function end(){
    state='over';
    if (score>best){ best=score; localStorage.setItem('neonSnakeBest',best); bestEl.textContent=best; }
    ovTitle.textContent='💀 Game Over';
    ovText.textContent = `Você fez ${score} ponto${score===1?'':'s'}. Recorde: ${best}.`;
    startBtn.textContent='↻ Jogar de novo';
    overlay.classList.remove('hidden');
  }

  // input
  startBtn.addEventListener('click', ()=>{ (state==='pause')?pause():play(); });
  window.addEventListener('keydown', e=>{
    const k=e.key.toLowerCase();
    if (['arrowup','w'].includes(k)) setDir(0,-1);
    else if (['arrowdown','s'].includes(k)) setDir(0,1);
    else if (['arrowleft','a'].includes(k)) setDir(-1,0);
    else if (['arrowright','d'].includes(k)) setDir(1,0);
    else if (k===' '){ e.preventDefault(); pause(); return; }
    else return;
    if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
  });
  // d-pad
  document.getElementById('pad').addEventListener('click', e=>{
    const d=e.target.dataset.dir; if(!d) return;
    if(d==='up')setDir(0,-1); if(d==='down')setDir(0,1); if(d==='left')setDir(-1,0); if(d==='right')setDir(1,0);
  });
  // swipe
  let tx=0,ty=0;
  canvas.addEventListener('touchstart',e=>{const t=e.touches[0];tx=t.clientX;ty=t.clientY;},{passive:true});
  canvas.addEventListener('touchend',e=>{
    const t=e.changedTouches[0];const dx=t.clientX-tx,dy=t.clientY-ty;
    if(Math.abs(dx)<20&&Math.abs(dy)<20)return;
    if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1,0); else setDir(0,dy>0?1:-1);
  },{passive:true});

  window.addEventListener('resize', ()=>{ fitCanvas(); draw(); });

  // boot
  fitCanvas(); reset(); state='idle'; draw();
})();
</script>
</body>
</html>
