<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Henri Mafra — Portfólio</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;700&family=Sacramento&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#060506; --muted:#bdb9bf; --text:#f6f6f7;
    --ink:#b90000; --gold:#ffcf5c; --glow: 0 14px 60px rgba(185,0,0,0.12);
    --trans: 420ms cubic-bezier(.2,.9,.2,1); --nav-h:72px;
  }
  body.light{ --bg:#fbfaf8; --muted:#33363a; --text:#111214; --ink:#8b0000; --gold:#c9a200; }

  *{box-sizing:border-box}
  body{
    margin:0; font-family: 'Montserrat', sans-serif;
    background: radial-gradient(900px 420px at 8% 12%, rgba(185,0,0,0.03), transparent), var(--bg);
    color:var(--text); transition: background var(--trans), color var(--trans);
    overflow-x: hidden; cursor: none;
  }

  nav{ position:fixed; top:14px; left:0; right:0; display:flex; justify-content:center; z-index:1400; }
  .nav-inner{
    width:95%; max-width:1180px; display:flex; align-items:center; justify-content:space-between;
    padding:10px 20px; background: rgba(255,255,255,0.02); border-radius:14px;
    backdrop-filter: blur(12px); box-shadow: var(--glow);
  }
  .logo{font-family:'Crimson Text',serif; color:var(--gold); font-weight:700;}
  .nav-links a{color:var(--text); text-decoration:none; font-weight:700; margin-left:15px;}

  header{
    min-height: 100vh; padding: 100px 20px;
    display:flex; align-items:center; justify-content:center; flex-direction:column; text-align:center;
  }
  .avatar{ width:180px; height:180px; border-radius:20px; overflow:hidden; border:3px solid rgba(255,255,255,0.05); margin-bottom: 20px;}
  .avatar img{width:100%; height:100%; object-fit:cover;}

  /* ESTRUTURA DA ASSINATURA SEM SOBREPOSIÇÃO */
  .sig-wrap {
    width: 100%; max-width: 520px; min-height: 120px;
    position: relative; margin-bottom: 20px;
  }
  .sig-svg { width: 100%; height: auto; }
  .sig-path { fill:none; stroke:var(--text); stroke-width:2.5; stroke-dasharray: 1000; stroke-dashoffset: 1000; }
  
  #signatureText {
    font-family: 'Sacramento'; font-size: 60px; color: var(--ink);
    opacity: 0; margin-top: -45px; pointer-events: none;
  }

  .bio { font-size: 1.1rem; color: var(--muted); max-width: 600px; line-height: 1.6; }
  .badge { 
    display: inline-block; padding: 10px 20px; margin: 5px; 
    background: rgba(255,255,255,0.05); border-radius: 10px; 
    color: var(--text); text-decoration: none; font-weight: bold; transition: 0.3s;
  }
  .badge:hover { transform: translateY(-3px); background: var(--ink); }

  .cursor{ position:fixed; width:15px; height:15px; border-radius:50%; background:var(--ink); pointer-events:none; z-index:9999; transform:translate(-50%,-50%); transition: transform 0.1s; }

  @media (max-width: 600px) { #signatureText { font-size: 40px; margin-top: -30px; } }
</style>
</head>
<body>

<div id="cursor" class="cursor"></div>

<nav>
  <div class="nav-inner">
    <div class="logo">HENRI MAFRA</div>
    <div class="nav-links">
      <a href="#projetos">Projetos</a>
      <a href="#contato">Contato</a>
    </div>
  </div>
</nav>

<header>
  <div class="avatar">
    <img src="https://avatars.githubusercontent.com/u/104782116?v=4">
  </div>

  <div class="sig-wrap">
    <svg class="sig-svg" viewBox="0 0 520 86">
      <path id="sigPath" class="sig-path" d="M12 54 C36 18, 86 12, 132 36 C180 62, 220 52, 260 34 C300 16, 340 40, 380 30 C420 20, 460 62, 504 52"/>
    </svg>
    <div id="signatureText">Henri Mafra</div>
  </div>

  <div class="bio">
    <p>👨‍💻 Estudante de Ciência de Dados e Machine Learning</p>
    <p>🤖 Apaixonado por IA | 🐍 Entusiasta de Python</p>
    <p style="font-size: 0.9rem; opacity: 0.8;">Exploro inteligência artificial e automação para criar soluções precisas.</p>
  </div>

  <div style="margin-top: 30px;">
    <a href="https://github.com/HenriMafra?tab=repositories" class="badge" target="_blank">GitHub</a>
    <a href="https://www.linkedin.com/in/henrimafra" class="badge" target="_blank">LinkedIn</a>
  </div>
</header>

<script>
  // Animação da Assinatura
  window.addEventListener('DOMContentLoaded', () => {
    const path = document.getElementById('sigPath');
    const text = document.getElementById('signatureText');
    const length = path.getTotalLength();

    path.style.strokeDasharray = length;
    path.style.strokeDashoffset = length;

    setTimeout(() => {
      path.style.transition = 'stroke-dashoffset 2s ease-in-out';
      path.style.strokeDashoffset = '0';
      setTimeout(() => {
        text.style.transition = 'opacity 1s ease';
        text.style.opacity = '1';
      }, 1500);
    }, 500);
  });

  // Cursor personalizado
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', (e) => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });
</script>

</body>
</html>
